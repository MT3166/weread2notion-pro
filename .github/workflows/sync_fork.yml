name: Sync Fork

on:
  schedule:
    - cron: '0 23 * * *' # every 30 minutes
  workflow_dispatch: # on button click

jobs:
  sync:

    runs-on: ubuntu-latest

    steps:
      - uses: tgymnich/fork-sync@v1.8
        with:
          token: ${{ secrets.GIT_TOKEN }}
          base: master
          head: master
